<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTBDE Manager</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; color: #333; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #0056b3; margin-top: 0; text-align: center; }
        h2 { font-size: 1rem; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 0; }
        h3 { font-size: 0.9rem; color: #555; margin-top: 10px; }
        select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        button { background-color: #0056b3; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #004494; }
        button.secondary { background-color: #6c757d; }
        button.secondary:hover { background-color: #5a6268; }
        .lineup-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .slot-num { font-weight: bold; color: #0056b3; width: 30px; }
        .player-name { flex-grow: 1; font-weight: 500; }
        .player-hand { font-size: 0.8rem; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .reason { font-size: 0.75rem; color: #555; display: block; margin-top: 2px; }
        .scout-note { background-color: #fff3cd; padding: 10px; border-radius: 8px; border-left: 5px solid #ffc107; margin-top: 10px; font-size: 0.9rem; }
        .badge { font-size: 0.7rem; padding: 2px 4px; border-radius: 4px; margin-left: 5px; }
        .badge-hi-hot { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .badge-hi-cold { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .badge-as-high { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .badge-as-low { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; min-width: 80px; padding: 10px; background: #eee; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .tab-btn.active { background: #0056b3; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f9f9f9; }
        .rec-card { background: #e7f3ff; border: 1px solid #b3d7ff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .rec-title { font-weight: bold; color: #0056b3; }
        
        /* Drag and Drop Styles */
        .dd-container { display: flex; gap: 15px; flex-wrap: wrap; }
        .dd-column { flex: 1; min-width: 140px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        .dd-column h3 { margin-top: 0; font-size: 0.9rem; text-align: center; color: #555; }
        .draggable-item { 
            background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 5px; 
            border-radius: 6px; cursor: grab; display: flex; align-items: center; justify-content: space-between;
            font-size: 0.9rem;
        }
        .draggable-item:active { cursor: grabbing; background: #eef; }
        .draggable-item .slot-badge { 
            background: #0056b3; color: white; font-weight: bold; 
            width: 20px; height: 20px; border-radius: 50%; text-align: center; line-height: 20px; 
            font-size: 0.8rem; margin-right: 8px;
        }
        .bench-item .slot-badge { background: #999; }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚾ RTBDE Manager</h1>
        <p style="text-align:center; color:#666; font-size:0.9rem;">Schaumburg Boomers vs. Lake Erie</p>
        
        <label for="pitcher-select"><strong>Select Opposing Pitcher:</strong></label>
        <select id="pitcher-select" onchange="generateLineup()">
            <option value="friday_may_8">Friday: Andres Parra (LHP)</option>
            <option value="saturday_may_9">Saturday: Brandon Scott (LHP)</option>
            <option value="sunday_may_10">Sunday: Corbin Foy (RHP)</option>
        </select>
    </div>

    <div class="card">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('baseline')">Baseline</button>
            <button class="tab-btn" onclick="switchTab('optimized')">Optimized</button>
            <button class="tab-btn" onclick="switchTab('setup')">Setup Lineup</button>
            <button class="tab-btn" onclick="switchTab('pinchhit')">Pinch Hit</button>
        </div>

        <!-- BASELINE VIEW -->
        <div id="baseline-view" class="view-section active">
            <h2>📋 Baseline Lineup (Jamie's Formula)</h2>
            <div id="baseline-list"></div>
        </div>

        <!-- OPTIMIZED VIEW -->
        <div id="optimized-view" class="view-section">
            <h2>🎯 Optimized Lineup (vs. Selected Pitcher)</h2>
            <div id="scout-report" class="scout-note"></div>
            <div id="optimized-list" style="margin-top:15px;"></div>
        </div>

        <!-- SETUP VIEW (DRAG AND DROP) -->
        <div id="setup-view" class="view-section">
            <h2>⚙️ Set Active Lineup</h2>
            <p style="font-size:0.8rem; color:#666;">Drag players between slots to reorder. Move players to/from Bench.</p>
            
            <div class="dd-container">
                <!-- Active Lineup Column -->
                <div class="dd-column" id="active-list" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3>Active Lineup (1-9)</h3>
                </div>

                <!-- Bench Column -->
                <div class="dd-column" id="bench-list" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3>Bench</h3>
                </div>
            </div>
            
            <button onclick="saveManualLineup()" style="margin-top:15px;">Save This Lineup</button>
        </div>

        <!-- PINCH HIT VIEW -->
        <div id="pinchhit-view" class="view-section">
            <h2>🔄 Pinch Hit / Substitution</h2>
            
            <label><strong>1. Who is batting now? (Select Player to Replace)</strong></label>
            <select id="ph-slot-select">
                <!-- Options populated dynamically -->
            </select>

            <button class="secondary" onclick="getPinchHitRecs()">Get Recommendations</button>

            <div id="ph-results" style="margin-top:15px;"></div>
        </div>
    </div>

    <script>
        // HARDCODED DATA FOR OFFLINE USE
        const data = {
          "boomers_roster": [
            {"name": "Alex Calarco", "hand": "S", "pos": "C", "stats": {"obp": 0.547, "bb_pct": 0.34, "sb": 0, "ba": 0.383, "slg": 0.596, "ops": 1.143, "k_pct": 0.15, "hi": 1.1, "as": 0.3}},
            {"name": "Myles Beale", "hand": "S", "pos": "OF", "stats": {"obp": 0.505, "bb_pct": 0.176, "sb": 19, "ba": 0.364, "slg": 0.564, "ops": 1.069, "k_pct": 0.093, "hi": 1.0, "as": 0.4}},
            {"name": "Anthony Calarco", "hand": "L", "pos": "IF", "stats": {"obp": 0.434, "bb_pct": 0.12, "sb": 3, "ba": 0.347, "slg": 0.627, "ops": 1.061, "k_pct": 0.15, "hi": 0.9, "as": 0.6}},
            {"name": "Kellum Clark", "hand": "L", "pos": "OF", "stats": {"obp": 0.471, "bb_pct": 0.156, "sb": 7, "ba": 0.377, "slg": 0.628, "ops": 1.099, "k_pct": 0.218, "hi": 1.2, "as": 0.5}},
            {"name": "Banks Tolley", "hand": "R", "pos": "OF", "stats": {"obp": 0.412, "bb_pct": 0.12, "sb": 2, "ba": 0.313, "slg": 0.515, "ops": 0.928, "k_pct": 0.19, "hi": 1.0, "as": 0.5}},
            {"name": "Kyle Fitzgerald", "hand": "R", "pos": "IF", "stats": {"obp": 0.383, "bb_pct": 0.12, "sb": 11, "ba": 0.281, "slg": 0.455, "ops": 0.838, "k_pct": 0.21, "hi": 1.0, "as": 0.5}},
            {"name": "Christian Fedko", "hand": "L", "pos": "OF", "stats": {"obp": 0.393, "bb_pct": 0.13, "sb": 11, "ba": 0.279, "slg": 0.400, "ops": 0.793, "k_pct": 0.10, "hi": 1.0, "as": 0.4}},
            {"name": "Will Prater", "hand": "L", "pos": "IF", "stats": {"obp": 0.347, "bb_pct": 0.09, "sb": 7, "ba": 0.274, "slg": 0.363, "ops": 0.710, "k_pct": 0.18, "hi": 1.0, "as": 0.5}},
            {"name": "Alec Craig", "hand": "L", "pos": "IF", "stats": {"obp": 0.427, "bb_pct": 0.21, "sb": 11, "ba": 0.258, "slg": 0.320, "ops": 0.747, "k_pct": 0.13, "hi": 0.8, "as": 0.3}},
            {"name": "Jeff Nicol", "hand": "R", "pos": "C", "stats": {"obp": 0.360, "bb_pct": 0.104, "sb": 0, "ba": 0.264, "slg": 0.401, "ops": 0.761, "k_pct": 0.308, "hi": 1.0, "as": 0.5}},
            {"name": "Cole Turney", "hand": "L", "pos": "OF", "stats": {"obp": 0.340, "bb_pct": 0.043, "sb": 0, "ba": 0.280, "slg": 0.550, "ops": 0.890, "k_pct": 0.348, "hi": 1.0, "as": 0.7}},
            {"name": "Tony Livermore", "hand": "L", "pos": "IF", "stats": {"obp": 0.216, "bb_pct": 0.065, "sb": 0, "ba": 0.171, "slg": 0.171, "ops": 0.388, "k_pct": 0.290, "hi": 0.8, "as": 0.6}}
          ],
          "lec_pitching_matchups": {
            "friday_may_8": {
              "pitcher": "Andres Parra",
              "hand": "LHP",
              "weakness": "Inexperience, likely high walk rate.",
              "recommendation": "Aggressive early counts. Test secondary pitches. Load up on Lefty Batters if they have high OBP."
            },
            "saturday_may_9": {
              "pitcher": "Brandon Scott",
              "hand": "LHP",
              "weakness": "Control issues. High Walk Rate.",
              "recommendation": "Work deep counts. Force walks. Avoid chasing sliders out of zone."
            },
            "sunday_may_10": {
              "pitcher": "Corbin Foy",
              "hand": "RHP",
              "weakness": "Predictable mix. Rarely throws Changeup/Sinker.",
              "recommendation": "Do not chase Slider out of zone. Sit on Fastball. He gives up hard contact."
            }
          }
        };

        // State Management
        let manualLineup = []; // Array of 9 names
        let manualBench = []; // Array of 3 names
        let currentOptimizedLineup = []; 

        function switchTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-view').classList.add('active');
            event.target.classList.add('active');
            
            if(tabName === 'setup') renderDragDropInterface();
            if(tabName === 'pinchhit') updatePinchHitDropdown();
        }

        function calculateMS(player, pitcherKey) {
            let ms = 50; 
            const pitcherInfo = data.lec_pitching_matchups[pitcherKey];
            
            if (pitcherInfo.hand === 'LHP') {
                if (player.hand === 'R' || player.hand === 'S') ms += 10;
                if (player.hand === 'L') ms -= 5;
                if (player.name === "Alec Craig") ms += 20; 
                if (player.name === "Banks Tolley") ms += 15; 
                if (player.name === "Kellum Clark") ms += 10; 
            } else {
                if (player.hand === 'L' || player.hand === 'S') ms += 10;
                if (player.hand === 'R') ms -= 5;
                if (player.name === "Anthony Calarco") ms += 10;
                if (player.name === "Myles Beale") ms += 10;
            }
            
            if (["Alex Calarco", "Anthony Calarco", "Kyle Fitzgerald"].includes(player.name)) ms += 5;
            
            return ms;
        }

        function generateLineup() {
            const pitcherKey = document.getElementById('pitcher-select').value;
            const pitcherInfo = data.lec_pitching_matchups[pitcherKey];
            
            let roster = JSON.parse(JSON.stringify(data.boomers_roster));
            roster.forEach(p => p.ms_score = calculateMS(p, pitcherKey));

            // --- BASELINE LOGIC ---
            let baseline = [];
            let remaining = [...roster];
            const getTop = (arr, sortFn) => arr.sort(sortFn)[0];
            const remove = (arr, item) => arr.filter(i => i !== item);

            let s1 = getTop([...remaining], (a,b) => (b.stats.obp*50 + b.stats.bb_pct*30 + b.stats.sb*0.5) - (a.stats.obp*50 + a.stats.bb_pct*30 + a.stats.sb*0.5));
            baseline.push({slot: 1, player: s1, reason: "Leadoff: High OBP/Walks"}); remaining = remove(remaining, s1);
            
            let s2 = getTop([...remaining], (a,b) => (b.stats.ba*40 + (1-b.stats.k_pct)*20) - (a.stats.ba*40 + (1-a.stats.k_pct)*20));
            baseline.push({slot: 2, player: s2, reason: "Driver: High BA/Contact"}); remaining = remove(remaining, s2);

            let s3 = getTop([...remaining], (a,b) => b.stats.ops - a.stats.ops);
            baseline.push({slot: 3, player: s3, reason: "Best Hitter: Highest OPS"}); remaining = remove(remaining, s3);

            let s4 = getTop([...remaining], (a,b) => b.stats.slg - a.stats.slg);
            baseline.push({slot: 4, player: s4, reason: "Power: Highest SLG"}); remaining = remove(remaining, s4);

            let s5 = getTop([...remaining], (a,b) => (b.stats.obp*30 + b.stats.slg*20) - (a.stats.obp*30 + a.stats.slg*20));
            baseline.push({slot: 5, player: s5, reason: "Protector: OBP/SLG Combo"}); remaining = remove(remaining, s5);

            let s6 = getTop([...remaining], (a,b) => (b.stats.ba*40 + (1-b.stats.k_pct)*30) - (a.stats.ba*40 + (1-a.stats.k_pct)*30));
            baseline.push({slot: 6, player: s6, reason: "Contact: High BA/Low K%"}); remaining = remove(remaining, s6);

            let s7 = getTop([...remaining], (a,b) => (b.stats.sb*2.0 + b.stats.obp*10) - (a.stats.sb*2.0 + a.stats.obp*10));
            baseline.push({slot: 7, player: s7, reason: "Wildcard: Speed/SB Threat"}); remaining = remove(remaining, s7);

            let s8 = getTop([...remaining], (a,b) => (b.stats.obp*40 + (1-b.stats.k_pct)*20) - (a.stats.obp*40 + (1-a.stats.k_pct)*20));
            baseline.push({slot: 8, player: s8, reason: "Bottom: OBP/Low K%"}); remaining = remove(remaining, s8);

            let s9 = getTop([...remaining], (a,b) => (b.stats.obp*40 + b.stats.sb*0.5) - (a.stats.obp*40 + a.stats.sb*0.5));
            baseline.push({slot: 9, player: s9, reason: "2nd Leadoff: OBP/SB"}); 

            // --- OPTIMIZED LOGIC ---
            let optimized = [];
            let optRemaining = [...roster];
            
            const optSort = (fn) => (a,b) => fn(a,b) + (b.ms_score - a.ms_score);

            let o1 = getTop([...optRemaining], optSort((a,b) => (b.stats.obp*50 + b.stats.bb_pct*30 + b.stats.sb*0.5) - (a.stats.obp*50 + a.stats.bb_pct*30 + a.stats.sb*0.5)));
            optimized.push({slot: 1, player: o1, reason: "Leadoff: High OBP + Matchup"}); optRemaining = remove(optRemaining, o1);

            let o2 = getTop([...optRemaining], optSort((a,b) => (b.stats.ba*40 + (1-b.stats.k_pct)*20) - (a.stats.ba*40 + (1-a.stats.k_pct)*20)));
            optimized.push({slot: 2, player: o2, reason: "Driver: Contact + Matchup"}); optRemaining = remove(optRemaining, o2);

            let o3 = getTop([...optRemaining], optSort((a,b) => b.stats.ops - a.stats.ops));
            optimized.push({slot: 3, player: o3, reason: "Best Hitter: OPS + Matchup"}); optRemaining = remove(optRemaining, o3);

            let o4 = getTop([...optRemaining], optSort((a,b) => b.stats.slg - a.stats.slg));
            optimized.push({slot: 4, player: o4, reason: "Power: SLG + Matchup"}); optRemaining = remove(optRemaining, o4);

            let o5 = getTop([...optRemaining], optSort((a,b) => (b.stats.obp*30 + b.stats.slg*20) - (a.stats.obp*30 + a.stats.slg*20)));
            optimized.push({slot: 5, player: o5, reason: "Protector: OBP/SLG + Matchup"}); optRemaining = remove(optRemaining, o5);

            let o6 = getTop([...optRemaining], optSort((a,b) => (b.stats.ba*40 + (1-b.stats.k_pct)*30) - (a.stats.ba*40 + (1-a.stats.k_pct)*30)));
            optimized.push({slot: 6, player: o6, reason: "Contact: BA/Low K + Matchup"}); optRemaining = remove(optRemaining, o6);

            let o7 = getTop([...optRemaining], optSort((a,b) => (b.stats.sb*2.0 + b.stats.obp*10) - (a.stats.sb*2.0 + a.stats.obp*10)));
            optimized.push({slot: 7, player: o7, reason: "Wildcard: Speed + Matchup"}); optRemaining = remove(optRemaining, o7);

            let o8 = getTop([...optRemaining], optSort((a,b) => (b.stats.obp*40 + (1-b.stats.k_pct)*20) - (a.stats.obp*40 + (1-a.stats.k_pct)*20)));
            optimized.push({slot: 8, player: o8, reason: "Bottom: OBP + Matchup"}); optRemaining = remove(optRemaining, o8);

            let o9 = getTop([...optRemaining], optSort((a,b) => (b.stats.obp*40 + b.stats.sb*0.5) - (a.stats.obp*40 + a.stats.sb*0.5)));
            optimized.push({slot: 9, player: o9, reason: "2nd Leadoff: OBP + Matchup"});

            currentOptimizedLineup = optimized; 
            
            // Initialize Manual Lineup with Optimized Order if empty
            if(manualLineup.length === 0) {
                manualLineup = optimized.map(o => o.player.name);
                manualBench = roster.filter(p => !manualLineup.includes(p.name)).map(p => p.name);
            }

            renderList(baseline, 'baseline-list');
            renderList(optimized, 'optimized-list');
            
            document.getElementById('scout-report').innerHTML = `
                <strong>Scout Report vs. ${pitcherInfo.pitcher} (${pitcherInfo.hand}):</strong><br>
                ${pitcherInfo.recommendation}<br>
                <em>Weakness: ${pitcherInfo.weakness}</em>
            `;
        }

        function renderList(list, containerId) {
            let html = "";
            list.forEach(item => {
                let p = item.player;
                let hiBadge = p.stats.hi > 1.1 ? '<span class="badge badge-hi-hot">🔥 Hot</span>' : (p.stats.hi < 0.9 ? '<span class="badge badge-hi-cold">❄️ Cold</span>' : '');
                let asBadge = p.stats.as > 0.6 ? '<span class="badge badge-as-high">⚡ Agg</span>' : (p.stats.as < 0.4 ? '<span class="badge badge-as-low">🛡️ Pass</span>' : '');
                
                html += `
                    <div class="lineup-item">
                        <span class="slot-num">${item.slot}.</span>
                        <div style="flex-grow:1;">
                            <span class="player-name">${p.name}</span>
                            <span class="player-hand">${p.hand}</span>
                            ${hiBadge} ${asBadge}
                            <span class="reason">${item.reason}</span>
                        </div>
                        <small style="color:#888;">${p.pos}</small>
                    </div>
                `;
            });
            document.getElementById(containerId).innerHTML = html;
        }

        // --- DRAG AND DROP LOGIC ---

        function renderDragDropInterface() {
            const activeContainer = document.getElementById('active-list');
            const benchContainer = document.getElementById('bench-list');
            
            activeContainer.innerHTML = '<h3>Active Lineup (1-9)</h3>';
            benchContainer.innerHTML = '<h3>Bench</h3>';

            for(let i=0; i<9; i++) {
                let playerName = manualLineup[i] || "Empty";
                let playerObj = data.boomers_roster.find(p => p.name === playerName);
                
                if(playerObj) {
                    let div = document.createElement('div');
                    div.className = 'draggable-item';
                    div.draggable = true;
                    div.id = `active-${i}`;
                    div.dataset.name = playerName;
                    div.dataset.type = 'active';
                    div.dataset.index = i;
                    div.ondragstart = drag;
                    
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <span class="slot-badge">${i+1}</span>
                            <div>
                                <div style="font-weight:bold;">${playerObj.name}</div>
                                <div style="font-size:0.8rem; color:#666;">${playerObj.pos} | ${playerObj.hand}</div>
                            </div>
                        </div>
                    `;
                    activeContainer.appendChild(div);
                }
            }

            manualBench.forEach(name => {
                let playerObj = data.boomers_roster.find(p => p.name === name);
                if(playerObj) {
                    let div = document.createElement('div');
                    div.className = 'draggable-item bench-item';
                    div.draggable = true;
                    div.id = `bench-${name.replace(/\s/g, '')}`;
                    div.dataset.name = name;
                    div.dataset.type = 'bench';
                    div.ondragstart = drag;
                    
                    div.innerHTML = `
                        <div style="display:flex; align-items:center;">
                            <span class="slot-badge" style="background:#999;">B</span>
                            <div>
                                <div style="font-weight:bold;">${playerObj.name}</div>
                                <div style="font-size:0.8rem; color:#666;">${playerObj.pos} | ${playerObj.hand}</div>
                            </div>
                        </div>
                    `;
                    benchContainer.appendChild(div);
                }
            });
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.dataset.name);
            ev.dataTransfer.setData("type", ev.target.dataset.type);
            ev.dataTransfer.setData("index", ev.target.dataset.index);
        }

        function drop(ev) {
            ev.preventDefault();
            var dataName = ev.dataTransfer.getData("text");
            var dataType = ev.dataTransfer.getData("type");
            var dataIndex = ev.dataTransfer.getData("index");
            
            var target = ev.target.closest('.draggable-item') || ev.target.closest('.dd-column');
            if(!target) return;
            
            var targetType = target.dataset.type || (target.id === 'active-list' ? 'active' : 'bench');
            var targetIndex = target.dataset.index;

            if (dataType === 'active' && targetType === 'active') {
                let temp = manualLineup[dataIndex];
                manualLineup[dataIndex] = manualLineup[targetIndex];
                manualLineup[targetIndex] = temp;
            } else if (dataType === 'active' && targetType === 'bench') {
                let movedPlayer = manualLineup.splice(dataIndex, 1)[0];
                manualBench.push(movedPlayer);
            } else if (dataType === 'bench' && targetType === 'active') {
                let benchPlayer = dataName;
                let activePlayer = manualLineup[targetIndex];
                
                manualLineup[targetIndex] = benchPlayer;
                manualBench = manualBench.filter(n => n !== benchPlayer);
                manualBench.push(activePlayer);
            }

            renderDragDropInterface();
        }

        function saveManualLineup() {
            if(manualLineup.length !== 9) {
                alert("Error: Lineup must have 9 players.");
                return;
            }
            alert("Custom Lineup Saved! Use 'Pinch Hit' tab for subs.");
            switchTab('pinchhit');
        }

        // --- PINCH HIT LOGIC ---

        function updatePinchHitDropdown() {
            const select = document.getElementById('ph-slot-select');
            select.innerHTML = ""; // Clear existing
            
            if(manualLineup.length !== 9) {
                let option = document.createElement('option');
                option.text = "Please save lineup first";
                select.add(option);
                return;
            }

            manualLineup.forEach((playerName, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.text = `${index + 1}. ${playerName}`;
                select.add(option);
            });
        }

        function getPinchHitRecs() {
            if (manualLineup.length !== 9) {
                alert("Please go to 'Setup Lineup' and save an active lineup first.");
                switchTab('setup');
                return;
            }

            const slotIndex = parseInt(document.getElementById('ph-slot-select').value);
            const pitcherKey = document.getElementById('pitcher-select').value;
            
            let currentPlayerName = manualLineup[slotIndex];
            let currentPlayer = data.boomers_roster.find(p => p.name === currentPlayerName);

            let benchPlayers = data.boomers_roster.filter(p => manualBench.includes(p.name));
            benchPlayers.forEach(p => p.ms_score = calculateMS(p, pitcherKey));

            let sortedBench = [...benchPlayers].sort((a,b) => {
                let scoreA = a.ms_score + (a.stats.hi * 10);
                let scoreB = b.ms_score + (b.stats.hi * 10);
                
                if (slotIndex === 0 || slotIndex === 8) { 
                    scoreA += a.stats.obp * 20;
                    scoreB += b.stats.obp * 20;
                }
                if (slotIndex === 3) { 
                    scoreA += a.stats.slg * 20;
                    scoreB += b.stats.slg * 20;
                }
                
                return scoreB - scoreA;
            });

            let topRec = sortedBench[0];
            let runnerUp = sortedBench[1];

            let html = `
                <div class="rec-card">
                    <div class="rec-title">✅ Top Recommendation: ${topRec.name} (${topRec.hand} ${topRec.pos})</div>
                    <div style="margin-top:5px;">
                        <strong>Why:</strong> Best Matchup (MS: ${Math.round(topRec.ms_score)}) and Hotness (HI: ${topRec.stats.hi}).<br>
                        <strong>Stats vs Pitcher:</strong> OBP ${topRec.stats.obp} | SLG ${topRec.stats.slg}
                    </div>
                </div>
            `;

            if(runnerUp) {
                html += `
                    <div class="rec-card" style="background:#fff; border-color:#ddd;">
                        <div class="rec-title" style="color:#555;">Alternative: ${runnerUp.name} (${runnerUp.hand} ${runnerUp.pos})</div>
                        <div style="margin-top:5px; font-size:0.9rem;">
                            MS: ${Math.round(runnerUp.ms_score)} | HI: ${runnerUp.stats.hi}
                        </div>
                    </div>
                `;
            }

            html += `<p><strong>Replacing:</strong> Slot ${slotIndex+1} (${currentPlayer ? currentPlayer.name : 'Unknown'})</p>`;

            document.getElementById('ph-results').innerHTML = html;
        }

        window.onload = function() {
            generateLineup();
        };
    </script>
</body>
</html>
