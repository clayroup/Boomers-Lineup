<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTBDE Lineup Optimizer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; color: #333; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #0056b3; margin-top: 0; text-align: center; }
        h2 { font-size: 1rem; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 0; }
        select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        button { background-color: #0056b3; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #004494; }
        .lineup-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .slot-num { font-weight: bold; color: #0056b3; width: 30px; }
        .player-name { flex-grow: 1; font-weight: 500; }
        .player-hand { font-size: 0.8rem; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .reason { font-size: 0.75rem; color: #555; display: block; margin-top: 2px; }
        .scout-note { background-color: #fff3cd; padding: 10px; border-radius: 8px; border-left: 5px solid #ffc107; margin-top: 10px; font-size: 0.9rem; }
        .badge { font-size: 0.7rem; padding: 2px 4px; border-radius: 4px; margin-left: 5px; }
        .badge-hi-hot { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .badge-hi-cold { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .badge-as-high { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .badge-as-low { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #0056b3; color: white; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚾ RTBDE Lineup Optimizer</h1>
        <p style="text-align:center; color:#666; font-size:0.9rem;">Schaumburg Boomers vs. Lake Erie</p>
        
        <label for="pitcher-select"><strong>Select Opposing Pitcher:</strong></label>
        <select id="pitcher-select">
            <option value="friday_may_8">Friday: Andres Parra (LHP)</option>
            <option value="saturday_may_9">Saturday: Brandon Scott (LHP)</option>
            <option value="sunday_may_10">Sunday: Corbin Foy (RHP)</option>
        </select>

        <button onclick="generateLineup()">Generate Lineups</button>
    </div>

    <div class="card">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('baseline')">Baseline</button>
            <button class="tab-btn" onclick="switchTab('optimized')">Optimized</button>
            <button class="tab-btn" onclick="switchTab('dashboard')">Dashboard</button>
        </div>

        <!-- BASELINE VIEW -->
        <div id="baseline-view" class="view-section active">
            <h2>📋 Baseline Lineup (Jamie's Formula)</h2>
            <div id="baseline-list"></div>
        </div>

        <!-- OPTIMIZED VIEW -->
        <div id="optimized-view" class="view-section">
            <h2>🎯 Optimized Lineup (vs. Selected Pitcher)</h2>
            <div id="scout-report" class="scout-note"></div>
            <div id="optimized-list" style="margin-top:15px;"></div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboard-view" class="view-section">
            <h2>📊 Player Status Dashboard</h2>
            <p style="font-size:0.8rem; color:#666;">Use this to manually tweak the lineup based on Hotness (HI) and Aggression (AS).</p>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Pos</th>
                        <th>HI</th>
                        <th>AS</th>
                        <th>MS</th>
                    </tr>
                </thead>
                <tbody id="dashboard-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        // HARDCODED DATA FOR OFFLINE USE
        const data = {
          "boomers_roster": [
            {"name": "Alex Calarco", "hand": "S", "pos": "C", "stats": {"obp": 0.547, "bb_pct": 0.34, "sb": 0, "ba": 0.383, "slg": 0.596, "ops": 1.143, "k_pct": 0.15, "hi": 1.1, "as": 0.3}},
            {"name": "Myles Beale", "hand": "S", "pos": "OF", "stats": {"obp": 0.505, "bb_pct": 0.176, "sb": 19, "ba": 0.364, "slg": 0.564, "ops": 1.069, "k_pct": 0.093, "hi": 1.0, "as": 0.4}},
            {"name": "Anthony Calarco", "hand": "L", "pos": "IF", "stats": {"obp": 0.434, "bb_pct": 0.12, "sb": 3, "ba": 0.347, "slg": 0.627, "ops": 1.061, "k_pct": 0.15, "hi": 0.9, "as": 0.6}},
            {"name": "Kellum Clark", "hand": "L", "pos": "OF", "stats": {"obp": 0.471, "bb_pct": 0.156, "sb": 7, "ba": 0.377, "slg": 0.628, "ops": 1.099, "k_pct": 0.218, "hi": 1.2, "as": 0.5}},
            {"name": "Banks Tolley", "hand": "R", "pos": "OF", "stats": {"obp": 0.412, "bb_pct": 0.12, "sb": 2, "ba": 0.313, "slg": 0.515, "ops": 0.928, "k_pct": 0.19, "hi": 1.0, "as": 0.5}},
            {"name": "Kyle Fitzgerald", "hand": "R", "pos": "IF", "stats": {"obp": 0.383, "bb_pct": 0.12, "sb": 11, "ba": 0.281, "slg": 0.455, "ops": 0.838, "k_pct": 0.21, "hi": 1.0, "as": 0.5}},
            {"name": "Christian Fedko", "hand": "L", "pos": "OF", "stats": {"obp": 0.393, "bb_pct": 0.13, "sb": 11, "ba": 0.279, "slg": 0.400, "ops": 0.793, "k_pct": 0.10, "hi": 1.0, "as": 0.4}},
            {"name": "Will Prater", "hand": "L", "pos": "IF", "stats": {"obp": 0.347, "bb_pct": 0.09, "sb": 7, "ba": 0.274, "slg": 0.363, "ops": 0.710, "k_pct": 0.18, "hi": 1.0, "as": 0.5}},
            {"name": "Alec Craig", "hand": "L", "pos": "IF", "stats": {"obp": 0.427, "bb_pct": 0.21, "sb": 11, "ba": 0.258, "slg": 0.320, "ops": 0.747, "k_pct": 0.13, "hi": 0.8, "as": 0.3}},
            {"name": "Jeff Nicol", "hand": "R", "pos": "C", "stats": {"obp": 0.360, "bb_pct": 0.104, "sb": 0, "ba": 0.264, "slg": 0.401, "ops": 0.761, "k_pct": 0.308, "hi": 1.0, "as": 0.5}},
            {"name": "Cole Turney", "hand": "L", "pos": "OF", "stats": {"obp": 0.340, "bb_pct": 0.043, "sb": 0, "ba": 0.280, "slg": 0.550, "ops": 0.890, "k_pct": 0.348, "hi": 1.0, "as": 0.7}},
            {"name": "Tony Livermore", "hand": "L", "pos": "IF", "stats": {"obp": 0.216, "bb_pct": 0.065, "sb": 0, "ba": 0.171, "slg": 0.171, "ops": 0.388, "k_pct": 0.290, "hi": 0.8, "as": 0.6}}
          ],
          "lec_pitching_matchups": {
            "friday_may_8": {
              "pitcher": "Andres Parra",
              "hand": "LHP",
              "weakness": "Inexperience, likely high walk rate.",
              "recommendation": "Aggressive early counts. Test secondary pitches. Load up on Lefty Batters if they have high OBP."
            },
            "saturday_may_9": {
              "pitcher": "Brandon Scott",
              "hand": "LHP",
              "weakness": "Control issues. High Walk Rate.",
              "recommendation": "Work deep counts. Force walks. Avoid chasing sliders out of zone."
            },
            "sunday_may_10": {
              "pitcher": "Corbin Foy",
              "hand": "RHP",
              "weakness": "Predictable mix. Rarely throws Changeup/Sinker.",
              "recommendation": "Do not chase Slider out of zone. Sit on Fastball. He gives up hard contact."
            }
          }
        };

        function switchTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName + '-view').classList.add('active');
            event.target.classList.add('active');
        }

        function generateLineup() {
            const pitcherKey = document.getElementById('pitcher-select').value;
            const pitcherInfo = data.lec_pitching_matchups[pitcherKey];
            
            // Clone roster
            let roster = JSON.parse(JSON.stringify(data.boomers_roster));

            // Calculate MS for each player
            roster.forEach(player => {
                player.ms_score = 50; // Base score
                
                // Platoon Bonus
                if (pitcherInfo.hand === 'LHP') {
                    if (player.hand === 'R' || player.hand === 'S') player.ms_score += 10;
                    if (player.hand === 'L') player.ms_score -= 5;
                    // Specific H2H/Platoon Boosts for LHP
                    if (player.name === "Alec Craig") player.ms_score += 20; // Elite vs LHP
                    if (player.name === "Banks Tolley") player.ms_score += 15; // Strong vs LHP
                    if (player.name === "Kellum Clark") player.ms_score += 10; // Power LHB vs LHP
                } else {
                    if (player.hand === 'L' || player.hand === 'S') player.ms_score += 10;
                    if (player.hand === 'R') player.ms_score -= 5;
                    // Specific Boosts for RHP
                    if (player.name === "Anthony Calarco") player.ms_score += 10;
                    if (player.name === "Myles Beale") player.ms_score += 10;
                }

                // H2H vs Lake Erie Boost
                if (["Alex Calarco", "Anthony Calarco", "Kyle Fitzgerald"].includes(player.name)) {
                    player.ms_score += 5;
                }
            });

            // --- BASELINE LINEUP LOGIC (Jamie's Formula + Option A) ---
            let baseline = [];
            let remaining = [...roster];

            // Slot 1: Leadoff (High OBP/BB, SB Tiebreaker)
            let s1 = [...remaining].sort((a,b) => (b.stats.obp * 50 + b.stats.bb_pct * 30 + b.stats.sb * 0.5) - (a.stats.obp * 50 + a.stats.bb_pct * 30 + a.stats.sb * 0.5))[0];
            baseline.push({slot: 1, player: s1, reason: "Leadoff: High OBP/Walks"});
            remaining = remaining.filter(p => p !== s1);

            // Slot 2: Driver (High BA/Contact)
            let s2 = [...remaining].sort((a,b) => (b.stats.ba * 40 + (1-b.stats.k_pct)*20) - (a.stats.ba * 40 + (1-a.stats.k_pct)*20))[0];
            baseline.push({slot: 2, player: s2, reason: "Driver: High BA/Contact"});
            remaining = remaining.filter(p => p !== s2);

            // Slot 3: Best Hitter (Highest OPS)
            let s3 = [...remaining].sort((a,b) => b.stats.ops - a.stats.ops)[0];
            baseline.push({slot: 3, player: s3, reason: "Best Hitter: Highest OPS"});
            remaining = remaining.filter(p => p !== s3);

            // Slot 4: Power (Highest SLG)
            let s4 = [...remaining].sort((a,b) => b.stats.slg - a.stats.slg)[0];
            baseline.push({slot: 4, player: s4, reason: "Power: Highest SLG"});
            remaining = remaining.filter(p => p !== s4);

            // Slot 5: Protector (High OBP/SLG)
            let s5 = [...remaining].sort((a,b) => (b.stats.obp * 30 + b.stats.slg * 20) - (a.stats.obp * 30 + a.stats.slg * 20))[0];
            baseline.push({slot: 5, player: s5, reason: "Protector: OBP/SLG Combo"});
            remaining = remaining.filter(p => p !== s5);

            // Slot 6: Contact (High BA/Low K)
            let s6 = [...remaining].sort((a,b) => (b.stats.ba * 40 + (1-b.stats.k_pct)*30) - (a.stats.ba * 40 + (1-a.stats.k_pct)*30))[0];
            baseline.push({slot: 6, player: s6, reason: "Contact: High BA/Low K%"});
            remaining = remaining.filter(p => p !== s6);

            // Slot 7: Wildcard (Primary SB/Speed) - OPTION A
            let s7 = [...remaining].sort((a,b) => (b.stats.sb * 2.0 + b.stats.obp * 10) - (a.stats.sb * 2.0 + a.stats.obp * 10))[0];
            baseline.push({slot: 7, player: s7, reason: "Wildcard: Speed/SB Threat"});
            remaining = remaining.filter(p => p !== s7);

            // Slot 8: Bottom (High OBP/Low K)
            let s8 = [...remaining].sort((a,b) => (b.stats.obp * 40 + (1-b.stats.k_pct)*20) - (a.stats.obp * 40 + (1-a.stats.k_pct)*20))[0];
            baseline.push({slot: 8, player: s8, reason: "Bottom: OBP/Low K%"});
            remaining = remaining.filter(p => p !== s8);

            // Slot 9: 2nd Leadoff (OBP/SB Tiebreaker) - OPTION A
            let s9 = [...remaining].sort((a,b) => (b.stats.obp * 40 + b.stats.sb * 0.5) - (a.stats.obp * 40 + a.stats.sb * 0.5))[0];
            baseline.push({slot: 9, player: s9, reason: "2nd Leadoff: OBP/SB"});
            remaining = remaining.filter(p => p !== s9);

            // --- OPTIMIZED LINEUP LOGIC (Uses MS Score) ---
            let optimized = [];
            let optRemaining = [...roster];

            // Re-run slot logic but add MS Score to the sort
            let o1 = [...optRemaining].sort((a,b) => (b.stats.obp * 50 + b.stats.bb_pct * 30 + b.stats.sb * 0.5 + b.ms_score) - (a.stats.obp * 50 + a.stats.bb_pct * 30 + a.stats.sb * 0.5 + a.ms_score))[0];
            optimized.push({slot: 1, player: o1, reason: "Leadoff: High OBP + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o1);

            let o2 = [...optRemaining].sort((a,b) => (b.stats.ba * 40 + (1-b.stats.k_pct)*20 + b.ms_score) - (a.stats.ba * 40 + (1-a.stats.k_pct)*20 + a.ms_score))[0];
            optimized.push({slot: 2, player: o2, reason: "Driver: Contact + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o2);

            let o3 = [...optRemaining].sort((a,b) => (b.stats.ops * 40 + b.ms_score) - (a.stats.ops * 40 + a.ms_score))[0];
            optimized.push({slot: 3, player: o3, reason: "Best Hitter: OPS + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o3);

            let o4 = [...optRemaining].sort((a,b) => (b.stats.slg * 50 + b.ms_score) - (a.stats.slg * 50 + a.ms_score))[0];
            optimized.push({slot: 4, player: o4, reason: "Power: SLG + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o4);

            let o5 = [...optRemaining].sort((a,b) => (b.stats.obp * 30 + b.stats.slg * 20 + b.ms_score) - (a.stats.obp * 30 + a.stats.slg * 20 + a.ms_score))[0];
            optimized.push({slot: 5, player: o5, reason: "Protector: OBP/SLG + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o5);

            let o6 = [...optRemaining].sort((a,b) => (b.stats.ba * 40 + (1-b.stats.k_pct)*30 + b.ms_score) - (a.stats.ba * 40 + (1-a.stats.k_pct)*30 + a.ms_score))[0];
            optimized.push({slot: 6, player: o6, reason: "Contact: BA/Low K + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o6);

            let o7 = [...optRemaining].sort((a,b) => (b.stats.sb * 2.0 + b.stats.obp * 10 + b.ms_score) - (a.stats.sb * 2.0 + a.stats.obp * 10 + a.ms_score))[0];
            optimized.push({slot: 7, player: o7, reason: "Wildcard: Speed + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o7);

            let o8 = [...optRemaining].sort((a,b) => (b.stats.obp * 40 + (1-b.stats.k_pct)*20 + b.ms_score) - (a.stats.obp * 40 + (1-a.stats.k_pct)*20 + a.ms_score))[0];
            optimized.push({slot: 8, player: o8, reason: "Bottom: OBP + Matchup"});
            optRemaining = optRemaining.filter(p => p !== o8);

            let o9 = [...optRemaining].sort((a,b) => (b.stats.obp * 40 + b.stats.sb * 0.5 + b.ms_score) - (a.stats.obp * 40 + a.stats.sb * 0.5 + a.ms_score))[0];
            optimized.push({slot: 9, player: o9, reason: "2nd Leadoff: OBP + Matchup"});

            // --- RENDER FUNCTIONS ---
            function renderList(list, containerId) {
                let html = "";
                list.forEach(item => {
                    let p = item.player;
                    let hiBadge = p.stats.hi > 1.1 ? '<span class="badge badge-hi-hot">🔥 Hot</span>' : (p.stats.hi < 0.9 ? '<span class="badge badge-hi-cold">❄️ Cold</span>' : '');
                    let asBadge = p.stats.as > 0.6 ? '<span class="badge badge-as-high">⚡ Agg</span>' : (p.stats.as < 0.4 ? '<span class="badge badge-as-low">🛡️ Pass</span>' : '');
                    
                    html += `
                        <div class="lineup-item">
                            <span class="slot-num">${item.slot}.</span>
                            <div style="flex-grow:1;">
                                <span class="player-name">${p.name}</span>
                                <span class="player-hand">${p.hand}</span>
                                ${hiBadge} ${asBadge}
                                <span class="reason">${item.reason}</span>
                            </div>
                            <small style="color:#888;">${p.pos}</small>
                        </div>
                    `;
                });
                document.getElementById(containerId).innerHTML = html;
            }

            function renderDashboard(roster, pitcherKey) {
                let html = "";
                // Sort by MS for dashboard view
                let sorted = [...roster].sort((a,b) => b.ms_score - a.ms_score);
                sorted.forEach(p => {
                    let hiBadge = p.stats.hi > 1.1 ? '<span class="badge badge-hi-hot">🔥</span>' : (p.stats.hi < 0.9 ? '<span class="badge badge-hi-cold">❄️</span>' : '–');
                    let asText = p.stats.as > 0.6 ? 'High' : (p.stats.as < 0.4 ? 'Low' : 'Med');
                    
                    html += `
                        <tr>
                            <td><strong>${p.name}</strong> <span class="player-hand">${p.hand}</span></td>
                            <td>${p.pos}</td>
                            <td>${hiBadge} (${p.stats.hi})</td>
                            <td>${asText} (${p.stats.as})</td>
                            <td><strong>${Math.round(p.ms_score)}</strong></td>
                        </tr>
                    `;
                });
                document.getElementById('dashboard-table').innerHTML = html;
            }

            // Render Scout Report
            document.getElementById('scout-report').innerHTML = `
                <strong>Scout Report vs. ${pitcherInfo.pitcher} (${pitcherInfo.hand}):</strong><br>
                ${pitcherInfo.recommendation}<br>
                <em>Weakness: ${pitcherInfo.weakness}</em>
            `;

            renderList(baseline, 'baseline-list');
            renderList(optimized, 'optimized-list');
            renderDashboard(roster, pitcherKey);
        }
    </script>
</body>
</html>
